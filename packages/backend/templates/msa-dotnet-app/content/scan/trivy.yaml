parameters:
  - name: source
    type: string
  - name: scanFrontend
    type: boolean
    default: false
  - name: scanCodeBackend
    type: boolean
    default: false
  - name: scanContainerBackend
    type: boolean
    default: true

jobs:
  - job: trivyScanFrontend
    displayName: Trivy Scan (Frontend)
    {% raw %}condition: eq('${{ parameters.scanFrontend }}', true){% endraw %}
    pool:
      vmImage: 'ubuntu-latest'
    steps: 
      {% raw %}- checkout: ${{ parameters.source }}{% endraw %}
      - script: |
          for d in */; do
            if [ -f "$d/package.json" ]; then
              echo "📦 Installing in $d"
              npm install --prefix "$d"
            fi
          done
        displayName: 'Run a multi-line script'
      - task: trivy@2
        inputs:
          {%- if values.parameters.trivyFrontendConfig.method == 'docker' %}
          method: $(method)
          image: $(image)
          {%- endif %}
          {%- if values.parameters.trivyFrontendConfig.method == 'system' %}
          method: $(method)
          templates: $(templates)
          {%- endif %}
          version: $(version)
          options: $(options)
          type: $(type)
          target: $(target)
          scanners: $(scanners)
          severities: $(severities)
          ignoreUnfixed: $(ignoreUnfixed)
          showSuppressed: $(showSuppressed)
          ignoreScanErrors: $(ignoreScanErrors)
          failOnSeverityThreshold: $(failOnSeverityThreshold)
          reports: $(reports)
          publish: $(publish)

  - job: trivyImageScanBackend
    displayName: Trivy Image Scan (Backend)
    {% raw %}condition: eq('${{ parameters.scanContainerBackend }}', true){% endraw %}
    pool:
      vmImage: 'ubuntu-latest'
    steps: 
      {% raw %}- checkout: ${{ parameters.source }}{% endraw %}
      - task: trivy@2
        inputs:
          method: $(method)
          version: $(version)
          type: $(type)
          target: $(target)
          scanners: $(scanners)
          severities: $(severities)
          ignoreUnfixed: $(ignoreUnfixed)
          failOnSeverityThreshold: $(failOnSeverityThreshold)
          reports: $(reports)
          publish: $(publish)
