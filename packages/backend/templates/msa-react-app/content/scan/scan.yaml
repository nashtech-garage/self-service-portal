parameters:
{% if snykScanCode %}
- name: runSnyk
  type: boolean
  default: false
  displayName: Run Snyk Scan
  description: Whether to include the Snyk security scan stage
{% endif %}

{% if sonarScanCode %}
- name: runSonar
  type: boolean
  default: false
  displayName: Run SonarQube Scan
  description: Whether to include the SonarQube code quality scan stage
{% endif %}

{% if trivyScanCode %}
- name: runTrivy
  type: boolean
  default: false
  displayName: Run Trivy Scan
  description: Whether to include the Trivy container vulnerability scan stage
{% endif %}

stages:
{% if snykEnabled %}
{% raw %}
  - ${{ if eq(parameters.snykEnabled, true) }}:
    - stage: SnykScan
      jobs:
        - template: snyk.yaml
          parameters:
            enabled: true
      variables:
        - group: ${{ parameters.snykVariableGroup }}
{% endraw %}   
{% endif %}
{% if sonarEnabled %}
{% raw %}
  - ${{ if eq(parameters.sonarEnabled, true) }}:
    - stage: SonarScan
      jobs:
        - template: sonar.yaml
          parameters:
            enabled: true
      variables:
        - group: ${{ parameters.sonarVariableGroup }}
{% endraw %}
{% endif %}
{% if trivyEnabled %}
{% raw %}
  - ${{ if eq(parameters.trivyEnabled, true) }}:
    - stage: TrivyScan
      jobs:
        - template: trivy.yaml
          parameters:
            enabled: true
      variables:
        - group: ${{ parameters.trivyVariableGroup }}
{% endraw %}
{% endif %}
