parameters:
  - name: source
      type: string
      default: true
  - name: enabled
      type: boolean
      default: false

jobs:
  - job: sonarScan
    displayName: SonarQube Scan (Angular)
    condition: eq('${{ parameters.enabled }}', true)
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: ${{ parameters.source }}    
      - task: UseJavaVersion@1
        inputs:
          versionSpec: '${{ parameters.jdkVersion }}'
          architecture: 'x64'
        displayName: 'Use Java ${{ parameters.jdkVersion }}'
      ${% if values.parameters.configMode == 'file' %}:
      - task: SonarQubePrepare@7
        inputs:
          SonarQube: $(SonarQube)
          scannerMode: $(scannerMode)
          cliScannerVersion: $(cliScannerVersion)
          configMode: $(configMode)

      {% endif %}
      ${% if values.parameters.configMode == 'manual' %}:
      - task: SonarQubePrepare@7
        inputs:
          SonarQube: $(SonarQube)
          scannerMode: $(scannerMode)
          cliScannerVersion: $(cliScannerVersion)
          configMode: $(configMode)
          cliProjectKey: $(cliProjectKey)
          cliProjectName: $(cliProjectName)
          cliSources: $(cliSources)
          extraProperties: $(extraProperties)
      {% endif %}

      - script: |
          npm install -g @angular/cli
          npm install
          npm run build
        displayName: 'Install and Build Angular App'

      - task: SonarQubePrepare@5
        inputs:
          SonarQube: 'SonarQubeServiceConnection'
          scannerMode: 'CLI'
          configMode: 'manual'
          cliProjectKey: ${{ parameters.projectKey }}
          cliProjectName: ${{ parameters.projectName }}
          extraProperties: ${{ parameters.extraProperties }}

      - task: SonarQubeAnalyze@5
        displayName: 'Run SonarQube Analysis'

      - task: SonarQubePublish@5
        inputs:
          pollingTimeoutSec: '300'
        displayName: 'Publish SonarQube Results'

