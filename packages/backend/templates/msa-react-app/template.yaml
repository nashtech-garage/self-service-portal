apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: react-app
  title: Creates and initializes a new React SPA
  description: This template will generate a Single Page App and deploy it on a Cluster. This application consists of three parts - Frontend, Backend, and Database.
  tags: 
    - application
spec:
  owner: user:le.caothihoang
  type: application
  parameters:
    - title: Choose A Repository Location
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository location for your new  React application
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            requestUserCredentials:
              secretsKey: USER_OAUTH_TOKEN
              additionalScopes:
                github:
                - repo  # Allows creating repositories
                - workflow  # Allows managing GitHub Actions
                azure:
                - email
                - openid
            allowedHosts:
              - github.com
              - dev.azure.com

    - title: Pipeline Configuration
      required:
        - branchName
        - project
        - folder
        - pipelineRepositoryName
        - pipelineName
      properties:
        project:
          type: string
          title: Project
          description: Azure DevOps project name
        folder:
          type: string
          title: Folder
          description: Pipeline folder path
        pipelineName:
          type: string
          title: Pipeline Name
          description: Name for the new pipeline
        pipelineRepositoryName:
          type: string
          title: Repository Name
          description: Name of the repository
        branchName:
          type: string
          title: Branch Name
          description: The name of the branch to be used for the pipeline
      uiSchema:
        project:
          "ui:autofocus": true
          "ui:placeholder": "Enter project name"
        folder:
          "ui:placeholder": "Enter folder path"
        PipelineName:
          "ui:placeholder": "Enter pipeline name"
        RepositoryName:
          "ui:placeholder": "Enter repository name"
        branchName:
          "ui:placeholder": "Enter branch name"
    
    
    # - title: Basic React Configuration
    #   required:
    #     - appName
    #     - backendName
    #     - backendImageName
    #     - frontendName
    #     - frontendImageName
    #   properties:
    #     appName:
    #       title: Application Name
    #       type: string
    #       description: The name of the msa react application
    #       ui:autofocus: true
    #     backendName:
    #       title: Backend Name
    #       type: string
    #       description: The name of the backend service
    #       ui:autofocus: true
    #     backendImageName:
    #       title: Backend Container Image Name
    #       type: string
    #       description: The name of your backend container image
    #     frontendName:
    #       title: Frontend Name
    #       type: string
    #       description: The name of the frontend service
    #       ui:autofocus: true
    #     frontendImageName:
    #       title: Fronent Container Image Name
    #       type: string
    #       description: The name of your frontent container image
    
    # - title: Choose UserName of Docker Hub
    #   required:
    #     - dockerHubUserName
    #   properties:
    #     dockerHubUserName:
    #       title: Username of Docker Hub
    #       type: string
    #       description: Username of Docker Hub
    #       ui:autofocus: true
    # - title: Scan
    #   properties:
    #     Tools:
    #       type: object
    #       title: Tools
    #       properties:
    #         checkboxFieldSnyk:
    #           title: Snyk
    #           type: boolean
    #         checkboxFieldSonar:
    #           title: Sonar
    #           type: boolean
    #         checkboxFieldTrivy:
    #           title: Trivy
    #           type: boolean

    - title: Select scan tools
      properties:
        useSnyk:
          type: boolean
          title: Run Snyk
          default: false
        useSonar:
          type: boolean
          title: Run Sonar
          default: false
        useTrivy:
          type: boolean
          title: Run Trivy
          default: false



    - title: Snyk Security Scan
      type: object
      properties:
       
        snykConfig:
          type: object
          ui:options:
            visibleIf:
              useSnyk: true
          properties:
            testType:
              title: Scan Type
              type: string
              enum: [app, container, code]
              default: app
            monitor:
              title: Upload Results to Snyk
              type: boolean
              default: false
            projectName:
              title: Snyk Project Name
              type: string
            additionalArguments:
              title: Extra CLI Arguments
              type: string
    
    - title: SonarQube Code Analysis
      type: object
      properties:
        
        sonarConfig:
          type: object
          ui:options:
            visibleIf:
              useSonar: true
          properties:
            configMode:
              type: string
              title: Configuration Mode
              enum: [manual, file]
              enumNames: [Manual, From File]
            extraProperties:
              type: string
            projectKey:
              type: string
            projectName:
              type: string
            jdkversion:
              type: string
    - title: Trivy Container Scan
      type: object
      properties:
        
        trivyConfig:
          type: object
          ui:options:
            visibleIf:
              useTrivy: true
          properties:
            scanType:
              type: string
              enum: [image, filesystem, repository, sbom]
              default: filesystem
            target:
              type: string
              default: '.'
            scanners:
              type: string
              default: 'vuln'
            format:
              type: string
              enum: [table, json, sarif, cyclonedx]
              default: json
            exitCode:
              type: integer
              enum: [0, 1]
              default: 0
            severity:
              type: string
              enum: [UNKNOWN, LOW, MEDIUM, HIGH, CRITICAL]
              default: LOW
    - title: Fill in some steps
      properties:
        name:
          title: Select environments
          type: array
          items:
            type: string
            enum:
              - production
              - staging
              - development
          uniqueItems: true
          ui:widget: checkboxes

    
  steps:
    
    - id: validate
      name: Validate Token
      action: custom:get-secret
      input:
        secretKey: AZURE_PAT
    
    - id: fetch-base
      name: Fetch template for Azure DevOps repository
      if: ${{ parameters.repoUrl | parseRepoUrl | pick('host') === "dev.azure.com" }}
      action: fetch:template
      input:
        url: ./content/scan
        targetPath: ./workspace
        values:
          appName: ${{ parameters.appName }}
          backendName: ${{ parameters.backendName }}
          backendImageName: ${{ parameters.backendImageName }}                 
          frontendName: ${{ parameters.frontendName }}
          frontendImageName: ${{ parameters.frontendImageName }}       
          dockerHubUserName: ${{ parameters.dockerHubUserName }}    
          repoURL: https://${{ parameters.repoUrl | parseRepoUrl | pick('organization') }}@dev.azure.com/${{ parameters.repoUrl | parseRepoUrl | pick('organization') }}/${{ parameters.repoUrl | parseRepoUrl | pick('project') }}/_git/${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
    
       
    - id: publish
      name: Publish to Azure DevOps
      if: ${{ parameters.repoUrl | parseRepoUrl | pick('host') === "dev.azure.com" }}
      action: publish:azure
      input:
        allowedHosts: ['dev.azure.com']
        description: This is ${{ parameters.clusterName }}
        repoUrl: ${{ parameters.repoUrl }}
        organization: ${{ parameters.repoUrl | parseRepoUrl | pick('organization') }}
        project: ${{ parameters.repoUrl | parseRepoUrl | pick('project') }}
        repo: ${{ parameters.repoUrl | parseRepoUrl | pick('repo') }}
        token: '${{ steps.validate.output.value }}'
    - id: getRepoId
      name: Get repository ID
      action: azure:get-repo-id
      input:
        organization: ${{ parameters.repoUrl | parseRepoUrl | pick('organization') }}
        project: ${{ parameters.repoUrl | parseRepoUrl | pick('project') }}
        repositoryName: ${{ parameters.pipelineRepositoryName }}
        token: '${{ steps.validate.output.value }}'
    - id: createPipeline
      name: Create Azure Pipeline
      action: azure:pipeline:create
      input:
        organization: ${{ parameters.repoUrl | parseRepoUrl | pick('organization') }}
        project: ${{ parameters.repoUrl | parseRepoUrl | pick('project') }}
        folder: ${{ parameters.folder }}
        name: ${{ parameters.pipelineName }}
        repositoryId: ${{ steps.getRepoId.output.repositoryId }}
        repositoryName: ${{ parameters.pipelineRepositoryName }}
        branchName: ${{ parameters.branchName }}
        token: '${{ steps.validate.output.value }}'
    
    - id: flatten
      name: Flatten Snyk Group
      action: util:flatten-parameter-group
      input:
        group: ${{ parameters.snykConfig }}

    - id: ensure-group
      name: Ensure Variable Group Exists
      action: custom:create-or-skip-variable-group
      input:
        organization: ${{ parameters.repoUrl | parseRepoUrl | pick('organization') }}
        project: ${{ parameters.project }}
        groupName: snykConfig
        token: ${{ steps.validate.output.value }}
        variables: ${{ steps.flatten.output.flattened }}

    - id: flatten-sonar
      name: Flatten Sonar Group
      action: util:flatten-parameter-group
      input:
        group: ${{ parameters.sonarConfig }}

    - id: ensure-sonar-group
      name: Ensure Sonar Variable Group Exists
      action: custom:create-or-skip-variable-group
      input:
        organization: ${{ parameters.repoUrl | parseRepoUrl | pick('organization') }}
        project: ${{ parameters.project }}
        groupName: sonarConfig
        token: ${{ steps.validate.output.value }}
        variables: ${{ steps.flatten-sonar.output.flattened }}

    - id: flatten-trivy
      name: Flatten Trivy Group
      action: util:flatten-parameter-group
      input:
        group: ${{ parameters.trivyConfig }}

    - id: ensure-trivy-group
      name: Ensure Trivy Variable Group Exists
      action: custom:create-or-skip-variable-group
      input:
        organization: ${{ parameters.repoUrl | parseRepoUrl | pick('organization') }}
        project: ${{ parameters.project }}
        groupName: trivyConfig
        token: ${{ steps.validate.output.value }}
        variables: ${{ steps.flatten-trivy.output.flattened }}

    - id: parse-scan-template
      name: Parse scan.yaml (YAML)
      action: roadiehq:utils:fs:parse
      input:
        path: ./workspace/scan.yaml
        parser: yaml

    - id: show-scan-output
      name: Show Parsed scan.yaml Structure
      action: debug:log
      input:
        message: |
          ✅ Parsed scan.yaml structure:
          ${{ steps['parse-scan-template'].output.content }}
    - id: log-raw-scan
      name: Log Raw scan.yaml
      action: debug:log
      input:
        message: |
          ✅ Raw scan.yaml content:
          ${{ steps['parse-scan-template'].output.content | dump }}
